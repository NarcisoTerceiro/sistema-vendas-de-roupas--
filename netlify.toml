# ════════════════════════════════════════════════════════════
#  Configuração do Netlify — Benedictus Camisaria
#  Functions + PWA com auto-versionamento
# ════════════════════════════════════════════════════════════

[build]
  # Pasta onde estão os arquivos do site (raiz)
  publish = "."

  # Pasta onde estão as Netlify Functions
  functions = "netlify/functions"

  # Substitui o placeholder __BUILD_ID__ no sw.js do PWA pelo ID único deste deploy.
  command = """
    BUILD_ID="${COMMIT_REF:-$(date -u +%Y%m%d%H%M%S)}"
    echo "Injetando BUILD_ID=$BUILD_ID no PWA"
    sed -i "s|__BUILD_ID__|$BUILD_ID|g" pwa/sw.js
    echo "PWA versionado com sucesso."
  """

[functions]
  node_bundler = "esbuild"

# ──────────────────────────────────────────────────────────
#  Plugin: instala as dependências (nodemailer) das Functions
# ──────────────────────────────────────────────────────────
[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# ──────────────────────────────────────────────────────────
#  Headers de segurança (aplicados ao site inteiro)
# ──────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ──────────────────────────────────────────────────────────
#  PWA: anti-cache para forçar atualização imediata
# ──────────────────────────────────────────────────────────

[[headers]]
  for = "/pwa/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    Service-Worker-Allowed = "/pwa/"

[[headers]]
  for = "/pwa/admin.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/pwa/adminsenha.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/pwa/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/manifest+json"